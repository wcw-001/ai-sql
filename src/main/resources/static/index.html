<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #f4efe6;
      --bg-2: #efe7dc;
      --ink: #1f2428;
      --muted: #5e646b;
      --card: rgba(255, 253, 249, 0.85);
      --line: #ddd3c7;
      --accent: #cf5d2e;
      --accent-2: #0f7a74;
      --ok: #1f7a45;
      --err: #b9381f;
      --radius: 16px;
      --shadow: 0 20px 40px rgba(60, 34, 15, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(80rem 50rem at 10% -10%, rgba(216, 162, 110, 0.35), transparent 45%),
        radial-gradient(60rem 36rem at 100% 0%, rgba(88, 167, 164, 0.25), transparent 45%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.12) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at center, black 55%, transparent 90%);
      opacity: 0.35;
    }

    .container {
      width: min(1120px, 100% - 32px);
      margin: 30px auto 40px;
      position: relative;
      z-index: 1;
      animation: loadIn 500ms ease;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 14px;
      margin-bottom: 16px;
    }

    .hero-main,
    .hero-side,
    .card {
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: var(--radius);
      background: var(--card);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .hero-main { padding: 20px; }
    .hero-side { padding: 18px; display: grid; align-content: center; }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 4.5vw, 46px);
      line-height: 1.05;
      letter-spacing: 0.01em;
    }

    .tag {
      display: inline-block;
      margin-bottom: 8px;
      font: 700 12px/1 "Space Mono", monospace;
      color: #76472f;
      background: #f5dfd0;
      border: 1px solid #e8c8b3;
      border-radius: 999px;
      padding: 6px 10px;
      text-transform: uppercase;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .side-item {
      margin: 0;
      padding: 10px 0;
      border-bottom: 1px dashed #d8d0c7;
      color: #3b3f43;
      font-size: 14px;
    }

    .side-item:last-child { border-bottom: 0; }

    .card { padding: 16px; }

    .query {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      max-height: 240px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid #d9d0c4;
      background: #fff;
      padding: 12px;
      font: 15px/1.5 "Noto Sans SC", sans-serif;
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(207, 93, 46, 0.15);
    }

    .actions { display: flex; gap: 8px; }

    button {
      border: 0;
      border-radius: 10px;
      min-width: 108px;
      padding: 10px 14px;
      cursor: pointer;
      font: 700 13px/1 "Space Mono", monospace;
      transition: transform .15s ease, filter .2s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.04); }
    button:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #da6635, #c24f26);
    }

    .btn-muted {
      color: #1d5f5b;
      background: #dff0ef;
      border: 1px solid #b9dedc;
    }

    .status {
      min-height: 22px;
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
    }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--err); }

    .panels {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 16px;
    }

    .title {
      margin: 0 0 10px;
      font: 700 12px/1.1 "Space Mono", monospace;
      letter-spacing: .05em;
      color: var(--accent-2);
      text-transform: uppercase;
    }

    pre {
      margin: 0;
      min-height: 68px;
      max-height: 260px;
      overflow: auto;
      border: 1px solid #e7ddd1;
      border-radius: 10px;
      background: #fffcf8;
      padding: 12px;
      font: 13px/1.55 "Space Mono", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .table-card { margin-top: 16px; }

    .table-wrap {
      border: 1px solid #e5dbcd;
      border-radius: 12px;
      background: #fff;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
      font-size: 14px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #f1e9df;
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      background: #fbf3e8;
      color: #554538;
      font: 700 12px/1 "Space Mono", monospace;
      letter-spacing: .03em;
    }

    .empty {
      color: #7a6f64;
      font-size: 14px;
      padding: 18px;
    }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
      .query { grid-template-columns: 1fr; }
      .panels { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
    }

    @keyframes loadIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <article class="hero-main">
        <span class="tag">Natural Language to SQL</span>
        <h1>SQL &#x67E5;&#x8BE2;&#x63A7;&#x5236;&#x53F0;</h1>
        <p class="desc">输入自然语言查询并转换成SQL</p>
      </article>
      <aside class="hero-side">
        <p class="side-item">&#x5FEB;&#x6377;&#x952E;&#xFF1A;<code>Ctrl/Cmd + Enter</code></p>
        <p class="side-item">&#x7AEF;&#x53E3;&#xFF1A;<code>http://localhost:8080</code></p>
      </aside>
    </section>

    <section class="card">
      <div class="query">
        <div>
          <div class="label">&#x81EA;&#x7136;&#x8BED;&#x8A00;&#x67E5;&#x8BE2;&#x5185;&#x5BB9;</div>
          <textarea id="queryInput" placeholder="&#x793A;&#x4F8B;&#xFF1A;&#x67E5;&#x8BE2;&#x6700;&#x8FD1; 7 &#x5929;&#x6CE8;&#x518C;&#x7684;&#x7528;&#x6237;&#x6570;&#x91CF;"></textarea>
        </div>
        <div class="actions">
          <button id="demoBtn" class="btn-muted" type="button">&#x586B;&#x5145;&#x793A;&#x4F8B;</button>
          <button id="runBtn" class="btn-primary" type="button">&#x6267;&#x884C;&#x67E5;&#x8BE2;</button>
        </div>
      </div>
      <div id="status" class="status"></div>
    </section>

    <section class="panels">
      <article class="card">
        <h2 class="title">生成SQL</h2>
        <pre id="sqlView">-</pre>
      </article>
      <article class="card">
        <h2 class="title">SQL评析</h2>
        <pre id="analysisView">{}</pre>
      </article>
    </section>

    <section class="card table-card">
      <h2 class="title">数据结果</h2>
      <div id="tableWrap" class="table-wrap">
        <div class="empty">&#x6682;&#x65E0;&#x6570;&#x636E;&#xFF0C;&#x8BF7;&#x5148;&#x6267;&#x884C;&#x67E5;&#x8BE2;&#x3002;</div>
      </div>
    </section>
  </div>

  <script>
    const queryInput = document.getElementById("queryInput");
    const runBtn = document.getElementById("runBtn");
    const demoBtn = document.getElementById("demoBtn");
    const statusEl = document.getElementById("status");
    const sqlView = document.getElementById("sqlView");
    const analysisView = document.getElementById("analysisView");
    const tableWrap = document.getElementById("tableWrap");

    function setStatus(text, kind = "") {
      statusEl.textContent = text;
      statusEl.className = `status ${kind}`.trim();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatValue(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "object") return JSON.stringify(value);
      return String(value);
    }

    function renderTable(rows) {
      if (!Array.isArray(rows) || rows.length === 0) {
        tableWrap.innerHTML = '<div class="empty">&#x67E5;&#x8BE2;&#x6210;&#x529F;&#xFF0C;&#x4F46;&#x672A;&#x8FD4;&#x56DE;&#x8BB0;&#x5F55;&#x3002;</div>';
        return;
      }

      const keys = [...new Set(rows.flatMap((row) => Object.keys(row || {})))];
      const thead = `<thead><tr>${keys.map((k) => `<th>${escapeHtml(k)}</th>`).join("")}</tr></thead>`;
      const tbody = `<tbody>${rows.map((row) => `<tr>${keys.map((key) => `<td>${escapeHtml(formatValue((row || {})[key]))}</td>`).join("")}</tr>`).join("")}</tbody>`;
      tableWrap.innerHTML = `<table>${thead}${tbody}</table>`;
    }

    async function runQuery() {
      const q = queryInput.value.trim();
      if (!q) {
        setStatus("请输入查询内容。", "error");
        return;
      }

      runBtn.disabled = true;
      setStatus("正在执行查询...");

      try {
        const response = await fetch(`/api/query/natural?q=${encodeURIComponent(q)}`);
        const json = await response.json();

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        if (json.code !== 0 || !json.data) {
          sqlView.textContent = "-";
          analysisView.textContent = "{}";
          renderTable([]);
          setStatus(`执行失败: ${json.message || "未知错误"}`, "error");
          return;
        }

        const result = json.data;
        sqlView.textContent = result.sql || "-";
        analysisView.textContent = JSON.stringify(result.sqlAnalysis || {}, null, 2);
        renderTable(result.data || []);
        const size = Array.isArray(result.data) ? result.data.length : 0;
        const score = result.sqlAnalysis && typeof result.sqlAnalysis.score === "number" ? result.sqlAnalysis.score : null;
        const level = result.sqlAnalysis && result.sqlAnalysis.level ? result.sqlAnalysis.level : null;
        if (score !== null && level) {
          setStatus(`查询成功: 返回 ${size} 行，SQL评分 ${score} (${level})`, "ok");
        } else {
          setStatus(`查询成功: 返回 ${size} 行`, "ok");
        }
      } catch (err) {
        sqlView.textContent = "-";
        analysisView.textContent = "{}";
        renderTable([]);
        setStatus(`请求异常: ${err.message}`, "error");
      } finally {
        runBtn.disabled = false;
      }
    }

    runBtn.addEventListener("click", runQuery);
    demoBtn.addEventListener("click", () => {
      queryInput.value = "查询所有用户";
      queryInput.focus();
    });
    queryInput.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") runQuery();
    });
  </script>
</body>
</html>
